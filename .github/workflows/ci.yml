name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (aras-dsl)
        run: cargo clippy -p aras-dsl -- -D warnings

      - name: Clippy (aras-layout)
        run: cargo clippy -p aras-layout -- -D warnings

      - name: Run tests (aras-dsl)
        run: cargo test -p aras-dsl --verbose

      - name: Run tests (aras-layout)
        run: cargo test -p aras-layout --verbose

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build aerial-engine (WASM)
        working-directory: aerial-engine
        run: wasm-pack build --target web --dev
