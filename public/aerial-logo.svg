<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Aerial wordmark: stylized thin-weight display letterforms -->
  <!-- The "horizon line" accent - evokes sky/aerial perspective -->
  <line x1="0" y1="72" x2="280" y2="72" stroke="currentColor" stroke-width="0.6" stroke-opacity="0.25"/>
  
  <!-- AERIAL text using geometric paths for a custom feel -->
  <!-- We use text with precise tracking for the wordmark -->
  <text 
    x="50%" 
    y="56" 
    text-anchor="middle"
    font-family="'Rephen', 'Georgia', serif"
    font-size="42"
    letter-spacing="12"
    fill="currentColor"
    font-weight="400"
  >AERIAL</text>
  
  <!-- Thin accent dot after the wordmark -->
  <circle cx="264" cy="55" r="2.5" fill="#6366f1" opacity="0.9"/>
</svg>
