<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Embed Rephen font so it renders correctly in standalone SVG contexts -->
    <style>
      @font-face {
        font-family: 'Rephen';
        src: url('/fonts/rephen.ttf') format('truetype');
      }
    </style>
  </defs>

  <!-- White rounded background -->
  <rect width="32" height="32" rx="7" fill="white"/>

  <!-- "A" in Rephen font — black on white -->
  <text
    x="16"
    y="23"
    font-family="Rephen, serif"
    font-size="22"
    fill="black"
    text-anchor="middle"
  >A</text>
</svg>
